<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Bhaiya Portfolio Dashboard – Screener.in Data</title>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0B0F19; color: #e0e0e0; }
    .container { max-width: 1200px; margin: auto; padding: 20px; }
    h1 { text-align: center; color: #00FF88; margin-bottom: 5px; }
    .subtitle { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 25px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { background: #151924; padding: 12px; text-align: left; color: #FFD700; border-bottom: 2px solid #2a2f3b; }
    td { padding: 10px; border-bottom: 1px solid #1e2430; }
    tr:hover { background: rgba(255,255,255,0.03); }
    .price { font-weight: 700; }
    .refresh-btn { background: #00FF88; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; display: block; margin: 20px auto 0; }
    .footer { text-align: center; margin-top: 30px; color: #666; font-size: 0.8rem; }
    a { color: #00FF88; }
    .loading { text-align: center; color: #aaa; padding: 40px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Master Golden Portfolio – Live Screener Data</h1>
    <div class="subtitle">Data refreshed every 4 hours from Screener.in</div>
    <div id="app">
      <div class="loading">Loading data…</div>
    </div>
    <button class="refresh-btn" onclick="fetchData()">Refresh Now</button>
    <div class="footer">Built for Siddhartha Bhaiya followers. <a href="#" target="_blank">GitHub Repo</a></div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxEM29YKOkb4qwD8ZJO784A2RjFnuQ9Xg6z3NHSAaG7FyTgv4F9coDDGlKm8Gh86g9J8Q/exec'; // Replace with your Apps Script Web App URL

    async function fetchData() {
      document.getElementById('app').innerHTML = '<div class="loading">Loading…</div>';
      try {
        const response = await fetch(API_URL);
        const data = await response.json();
        renderTable(data);
      } catch (err) {
        document.getElementById('app').innerHTML = '<div class="loading">Error loading data. Please try again.</div>';
      }
    }

    function renderTable(data) {
      if (!data.length) return;
      const statusMap = {
        KOTHARIPET:'buy', PANAMAPET:'buy', EXPLEOSOL:'buy', ACCELYA:'buy', PETRONET:'buy',
        BAJAJST:'accumulate', TIIL:'accumulate', SANGHVIMOV:'accumulate',
        SHARDAMOTR:'wait', INDIAMART:'wait', BECTORFOOD:'wait', KOVAI:'wait',
        SHARDACROP:'wait', MPSLTD:'wait', DHANUKA:'wait', MAMATA:'wait',
        EPL:'wait', GAEL:'wait', MAYURUNIQ:'wait'
      };
      let html = `<table>
        <thead><tr>
          <th>Ticker</th><th>CMP</th><th>P/E</th><th>ROCE %</th><th>D/E</th><th>Market Cap (Cr)</th><th>Status</th><th>Updated</th>
        </tr></thead><tbody>`;
      data.forEach(row => {
        const status = statusMap[row.Ticker];
        const tag = status === 'buy' ? '<span style="background:#00FF88;color:#0B0F19;padding:3px 8px;border-radius:4px;">Buy</span>' :
                    status === 'accumulate' ? '<span style="background:#FFD700;color:#0B0F19;padding:3px 8px;border-radius:4px;">Accumulate</span>' :
                    '<span style="background:#ff8800;color:#fff;padding:3px 8px;border-radius:4px;">Wait</span>';
        html += `<tr>
          <td>${row.Ticker}</td>
          <td class="price">₹${row.CMP || '--'}</td>
          <td>${row['P/E'] || '--'}</td>
          <td>${row.ROCE || '--'}</td>
          <td>${row['D/E'] || '--'}</td>
          <td>${row['Market Cap'] || '--'}</td>
          <td>${tag}</td>
          <td>${row['Last Updated'] || '--'}</td>
        </tr>`;
      });
      html += '</tbody></table>';
      document.getElementById('app').innerHTML = html;
    }

    // Fetch on load
    fetchData();
  </script>
</body>
</html>

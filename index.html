<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Golden Portfolio – Live Dashboard</title>
    <style>
        :root {
            --bg: #0B0F19;
            --card: #151924;
            --border: #2a2f3b;
            --text: #e0e0e0;
            --green: #00FF88;
            --gold: #FFD700;
            --red: #ff5555;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 30px 20px; }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--green);
            margin-bottom: 5px;
        }
        .subtitle {
            color: #888;
            font-size: 1rem;
        }
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 25px;
            font-size: 0.9rem;
            color: #aaa;
        }
        .status-bar span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .indicator {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--green);
        }
        .indicator.error { background: var(--red); }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--card);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th {
            background: #0d1117;
            padding: 14px 12px;
            text-align: left;
            color: var(--gold);
            font-weight: 600;
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        tr:hover td {
            background: rgba(255,255,255,0.03);
        }
        .price { font-weight: 700; font-size: 1.05rem; }
        .change.positive { color: var(--green); }
        .change.negative { color: var(--red); }
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .buy { background: var(--green); color: var(--bg); }
        .accumulate { background: var(--gold); color: var(--bg); }
        .wait { background: #ff8800; color: #fff; }
        .last-updated {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.85rem;
        }
        .error-message {
            text-align: center;
            padding: 50px;
            color: var(--red);
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Master Golden Portfolio</h1>
            <div class="subtitle">Live Dashboard — Siddhartha Bhaiya Framework</div>
        </header>

        <div class="status-bar">
            <span><span class="indicator" id="statusDot"></span> <span id="statusText">Connecting…</span></span>
            <span>🕒 <span id="lastRefresh">--</span></span>
            <span>📊 19 Stocks</span>
        </div>

        <div class="table-wrapper">
            <table id="stockTable">
                <thead>
                    <tr>
                        <th>Company</th>
                        <th>Ticker</th>
                        <th>Live Price</th>
                        <th>Change %</th>
                        <th>Market Cap (Cr)</th>
                        <th>P/E</th>
                        <th>ROCE %</th>
                        <th>D/E</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="9" class="loading">Loading live data…</td></tr>
                </tbody>
            </table>
        </div>

        <div class="last-updated" id="lastUpdatedText">Last refreshed: --</div>
    </div>

    <script>
        // ==================== STOCK DATA ====================
        const stocks = [
            { ticker: "KOTHARIPET", name: "Kothari Petrochemicals", status: "buy", roce: 28.6, de: 0.01 },
            { ticker: "PANAMAPET", name: "Panama Petrochem", status: "buy", roce: 20.4, de: 0.02 },
            { ticker: "EXPLEOSOL", name: "Expleo Solutions", status: "buy", roce: 24.8, de: 0 },
            { ticker: "ACCELYA", name: "Accelya Solutions", status: "buy", roce: 53.6, de: 0 },
            { ticker: "PETRONET", name: "Petronet LNG", status: "buy", roce: 22.7, de: 0.16 },
            { ticker: "BAJAJST", name: "Bajaj Steel Industries", status: "accumulate", roce: 29, de: 0.12 },
            { ticker: "TIIL", name: "Technocraft Industries", status: "accumulate", roce: 19.4, de: 0.34 },
            { ticker: "SANGHVIMOV", name: "Sanghvi Movers", status: "accumulate", roce: 16.7, de: 0.39 },
            { ticker: "SHARDAMOTR", name: "Sharda Motor", status: "wait", roce: 36, de: 0 },
            { ticker: "INDIAMART", name: "IndiaMart Intermesh", status: "wait", roce: 28, de: 0 },
            { ticker: "BECTORFOOD", name: "Mrs. Bectors Food", status: "wait", roce: 20, de: 0 },
            { ticker: "KOVAI", name: "Kovai Medical Center", status: "wait", roce: 22.2, de: 0.35 },
            { ticker: "SHARDACROP", name: "Sharda Cropchem", status: "wait", roce: 30.4, de: 0 },
            { ticker: "MPSLTD", name: "MPS Ltd", status: "wait", roce: 39.3, de: 0.06 },
            { ticker: "DHANUKA", name: "Dhanuka Agritech", status: "wait", roce: 24, de: 0 },
            { ticker: "MAMATA", name: "Mamata Machinery", status: "wait", roce: 34.9, de: 0 },
            { ticker: "EPL", name: "EPL Ltd", status: "wait", roce: 17.8, de: 0.34 },
            { ticker: "GAEL", name: "Gujarat Ambuja Exports", status: "wait", roce: 12.5, de: 0.07 },
            { ticker: "MAYURUNIQ", name: "Mayur Uniquoters", status: "wait", roce: 25, de: 0 }
        ];

        const statusLabel = { buy: "Buy Now", accumulate: "Accumulate", wait: "Wait" };
        const statusClass = { buy: "buy", accumulate: "accumulate", wait: "wait" };

        // ==================== FETCH LIVE DATA (CORS-PROXY) ====================
        async function fetchQuotes() {
            const symbols = stocks.map(s => s.ticker + ".NS").join(",");
            const yahooUrl = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols}`;
            // Use corsproxy.io (free, no key, reliable)
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(yahooUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                return data.quoteResponse.result;
            } catch (err) {
                console.error("Fetch error:", err);
                return null;
            }
        }

        // ==================== RENDER TABLE ====================
        function renderTable(quotes) {
            const tbody = document.getElementById("tableBody");
            if (!quotes) {
                tbody.innerHTML = '<tr><td colspan="9" class="error-message">⚠️ Failed to fetch live data. Retrying…</td></tr>';
                return;
            }

            const quoteMap = {};
            quotes.forEach(q => {
                quoteMap[q.symbol.replace(".NS", "")] = q;
            });

            let html = "";
            stocks.forEach(stock => {
                const q = quoteMap[stock.ticker];
                if (!q) {
                    html += `<tr>
                        <td>${stock.name}</td>
                        <td>${stock.ticker}</td>
                        <td colspan="7" style="color:#888;">Data unavailable</td>
                    </tr>`;
                    return;
                }

                const price = q.regularMarketPrice;
                const changePercent = q.regularMarketChangePercent;
                const marketCapCr = q.marketCap ? (q.marketCap / 10000000).toFixed(0) : "--";
                const pe = q.trailingPE ? q.trailingPE.toFixed(1) : "--";
                const changeClass = changePercent >= 0 ? "positive" : "negative";
                const changeSign = changePercent >= 0 ? "+" : "";

                html += `<tr>
                    <td>${stock.name}</td>
                    <td>${stock.ticker}</td>
                    <td class="price">₹${price ? price.toFixed(2) : "--"}</td>
                    <td class="change ${changeClass}">${changePercent ? changeSign + changePercent.toFixed(2) + "%" : "--"}</td>
                    <td>${marketCapCr !== "--" ? "₹" + marketCapCr + " Cr" : "--"}</td>
                    <td>${pe !== "--" ? pe + "x" : "--"}</td>
                    <td>${stock.roce}%</td>
                    <td>${stock.de}</td>
                    <td><span class="status-badge ${statusClass[stock.status]}">${statusLabel[stock.status]}</span></td>
                </tr>`;
            });

            tbody.innerHTML = html;
        }

        // ==================== MAIN UPDATE LOOP ====================
        async function updateDashboard() {
            const statusDot = document.getElementById("statusDot");
            const statusText = document.getElementById("statusText");
            const lastRefresh = document.getElementById("lastRefresh");
            const lastUpdatedText = document.getElementById("lastUpdatedText");

            statusDot.className = "indicator";
            statusText.textContent = "Refreshing…";

            const quotes = await fetchQuotes();
            renderTable(quotes);

            const now = new Date().toLocaleTimeString();
            lastRefresh.textContent = now;
            lastUpdatedText.textContent = `Last refreshed: ${now}`;

            if (quotes) {
                statusDot.className = "indicator";
                statusText.textContent = "Live";
            } else {
                statusDot.className = "indicator error";
                statusText.textContent = "Error – using last known data";
            }
        }

        // Initial load and auto-refresh every 60 seconds
        updateDashboard();
        setInterval(updateDashboard, 60000);
    </script>
</body>
</html>
